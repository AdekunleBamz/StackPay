name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Clarinet
        uses: hirosystems/setup-clarinet@v1
        with:
          version: '3.0.0'

      - name: Check contracts
        run: clarinet check

      - name: Run tests
        # We assume dependencies are installed or we skip vitest if not easily setup.
        # Since this repo uses Next.js, we might need npm install.
        run: |
          npm install
          clarinet test
